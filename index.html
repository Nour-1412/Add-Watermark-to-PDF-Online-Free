<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        PDF Watermark Tool
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="background-glow"></div>

    <main class="app-container">

        <!-- HERO -->

        <section class="hero-section">

            <h1 class="app-title">

                PDF Watermark Tool

            </h1>

            <p class="app-description">

                Add beautiful custom watermarks
                to your PDF files directly inside
                your browser.

            </p>

        </section>


        <!-- STEPS -->

        <section class="steps-container">

            <div class="step active">
                <div>1</div>
                <span>Upload</span>
            </div>

            <div class="step">
                <div>2</div>
                <span>Watermark</span>
            </div>

            <div class="step">
                <div>3</div>
                <span>Preview</span>
            </div>

            <div class="step">
                <div>4</div>
                <span>Export</span>
            </div>

        </section>


        <!-- UPLOAD -->

        <section
            id="upload-section"
            class="glass-card"
        >

            <div
                id="drop-zone"
                class="drop-zone"
            >

                <div class="upload-icon">

                    📄

                </div>

                <h2>

                    Upload Your PDF

                </h2>

                <p>

                    Drag & Drop your PDF here

                </p>

                <span>

                    or

                </span>

                <button
                    id="choose-file-btn"
                    class="primary-button"
                >

                    Choose PDF File

                </button>

                <input
                    type="file"
                    id="pdf-input"
                    accept=".pdf"
                    hidden
                >

                <div
                    id="file-name"
                    class="file-name"
                ></div>

            </div>

        </section>


        <!-- WATERMARK SETTINGS -->

        <section
            id="watermark-section"
            class="glass-card hidden"
        >

            <h2 class="section-title">

                Watermark Settings

            </h2>

            <div class="settings-container">

                <div class="input-group">

                    <label>
                        Watermark Text
                    </label>

                    <input
                        id="watermark-text"
                        type="text"
                        placeholder="Enter watermark text"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Font Size
                    </label>

                    <input
                        id="font-size"
                        type="range"
                        min="12"
                        max="120"
                        value="32"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Opacity
                    </label>

                    <input
                        id="opacity"
                        type="range"
                        min="10"
                        max="100"
                        value="50"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Rotation
                    </label>

                    <input
                        id="rotation"
                        type="range"
                        min="-180"
                        max="180"
                        value="-45"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Watermark Color
                    </label>

                    <input
                        id="watermark-color"
                        type="color"
                        value="#ffffff"
                    >

                </div>

                <button
                    id="continue-preview-btn"
                    class="primary-button"
                >

                    Continue To Preview

                </button>

            </div>

        </section>


        <!-- PREVIEW -->

        <section
            id="preview-section"
            class="glass-card hidden"
        >

            <h2 class="section-title">

                PDF Preview

            </h2>

            <div class="preview-card">

                <div class="pdf-preview-container">

                    <canvas
                        id="pdf-preview-canvas"
                    ></canvas>

                    <div
                        id="watermark-preview"
                    >

                        WATERMARK

                    </div>

                </div>

            </div>

            <div class="preview-actions">

                <button
                    id="back-to-settings-btn"
                    class="primary-button"
                >

                    Back To Settings

                </button>

                <button
                    id="continue-export-btn"
                    class="primary-button"
                >

                    Export PDF

                </button>

            </div>

        </section>


        <!-- EXPORT -->

        <section
            id="export-section"
            class="glass-card hidden"
        >

        </section>


        <!-- FOOTER -->

        <footer class="footer">

            <p>

                © 2026 PDF Watermark Tool

            </p>

        </footer>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script src="app.js"></script>

</body>

    </html>
