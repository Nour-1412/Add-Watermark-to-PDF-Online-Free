
<section id="upload-section" class="tool-section active-section">

    <div id="drop-zone" class="upload-card">

        <div class="upload-icon">
            📄
        </div>

        <h2>
            Drop PDF Here
        </h2>

        <p>
            or click the button below to choose a file
        </p>

        <button
            id="choose-file-btn"
            class="primary-btn"
        >
            Choose PDF File
        </button>

        <input
            type="file"
            id="pdf-input"
            accept=".pdf"
            hidden
        >

    </div>

    <div
        id="upload-error"
        class="error-message hidden"
    ></div>

    <div
        id="file-info"
        class="file-card hidden"
    >

        <h3 id="file-name"></h3>

        <p id="file-size"></p>

        <p id="page-count"></p>

        <button
            id="go-to-watermark-btn"
            class="primary-btn"
            disabled
        >
            Continue To Watermark Settings
        </button>

    </div>

</section>
