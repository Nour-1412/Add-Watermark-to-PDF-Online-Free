<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        WebBag PDF Watermark Tool
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- ======================================
         BACKGROUND EFFECT
    ======================================= -->

    <div class="background-glow"></div>

    <!-- ======================================
         MAIN CONTAINER
    ======================================= -->

    <main class="app-container">

        <!-- ======================================
             HEADER
        ======================================= -->

        <header class="hero-section">

            <h1 class="app-title">

                WebBag PDF Watermark Tool

            </h1>

            <p class="app-description">

                Add professional watermarks to your PDF
                documents directly in your browser.

            </p>

        </header>

        <!-- ======================================
             STEP INDICATOR
        ======================================= -->

        <div class="steps-container">

            <div class="step active">

                1
                <span>
                    Upload PDF
                </span>

            </div>

            <div class="step">

                2
                <span>
                    Watermark
                </span>

            </div>

            <div class="step">

                3
                <span>
                    Preview
                </span>

            </div>

            <div class="step">

                4
                <span>
                    Export
                </span>

            </div>

        </div>

        <!-- ======================================
             UPLOAD SECTION
        ======================================= -->

        <section
            id="upload-section"
            class="glass-card"
        >

            <div
                id="drop-zone"
                class="drop-zone"
            >

                <div class="upload-icon">

                    📄

                </div>

                <h2>

                    Upload Your PDF

                </h2>

                <p>

                    Drag & Drop your PDF here

                </p>

                <span>

                    or

                </span>

                <button
                    id="choose-file-btn"
                    class="primary-button"
                >

                    Choose PDF File

                </button>

                <input
                    type="file"
                    id="pdf-input"
                    accept=".pdf"
                    hidden
                >

                <div
                    id="file-name"
                    class="file-name"
                >

                </div>

            </div>

        </section>
<!-- ======================================
     WATERMARK SETTINGS SECTION
====================================== -->

<section
    id="watermark-section"
    class="glass-card hidden"
>

    <h2 class="section-title">

        Watermark Settings

    </h2>

    <div class="settings-container">

        <!-- WATERMARK TEXT -->

        <div class="input-group">

            <label>

                Watermark Text

            </label>

            <input
                id="watermark-text"
                type="text"
                placeholder="Enter watermark text"
            >

        </div>

        <!-- FONT SIZE -->

        <div class="input-group">

            <label>

                Font Size

            </label>

            <input
                id="font-size"
                type="range"
                min="12"
                max="120"
                value="32"
            >

        </div>

        <!-- OPACITY -->

        <div class="input-group">

            <label>

                Opacity

            </label>

            <input
                id="opacity"
                type="range"
                min="10"
                max="100"
                value="50"
            >

        </div>

        <!-- ROTATION -->

        <div class="input-group">

            <label>

                Rotation

            </label>

            <input
                id="rotation"
                type="range"
                min="-180"
                max="180"
                value="-45"
            >

        </div>

        <!-- COLOR -->

        <div class="input-group">

            <label>

                Watermark Color

            </label>

            <input
                id="watermark-color"
                type="color"
                value="#ffffff"
            >

        </div>

        <!-- NEXT BUTTON -->

        <button
            id="continue-preview-btn"
            class="primary-button"
        >

            Continue To Preview

        </button>

    </div>

</section>
<section
    id="watermark-section"
    class="glass-card hidden"
>

    ...

</section>

    </main>

    <!-- ======================================
         LIBRARIES
    ======================================= -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script src="app.js"></script>

</body>

        </html>
