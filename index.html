<!-- ==========================================
     PDF UPLOAD SECTION
========================================== -->

<section
    id="upload-section"
    class="tool-section active-section"
>

    <div
        id="drop-zone"
        class="upload-card"
    >

        <div class="upload-glow"></div>

        <div class="upload-icon">
            📄
        </div>

        <h1 class="upload-title">
            Upload Your PDF
        </h1>

        <p class="upload-description">
            Drag & Drop your PDF here
            or choose it from your device
        </p>

        <button
            id="choose-file-btn"
            class="primary-button"
            type="button"
        >
            Choose PDF File
        </button>

        <input
            id="pdf-input"
            type="file"
            accept=".pdf,application/pdf"
            hidden
        >

    </div>

    <div
        id="upload-error"
        class="error-message hidden"
    ></div>

    <div
        id="file-info"
        class="file-card hidden"
    >

        <div class="file-card-header">

            <div class="file-icon">
                📑
            </div>

            <div class="file-details">

                <h3 id="file-name">
                    -
                </h3>

                <p id="file-size">
                    -
                </p>

                <p id="page-count">
                    -
                </p>

            </div>

        </div>

        <button
            id="go-to-watermark-btn"
            class="primary-button"
            disabled
            type="button"
        >
            Continue To Watermark Settings
        </button>

    </div>

</section>
